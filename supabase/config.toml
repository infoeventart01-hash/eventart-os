project_id = "dntzbpwmnnwbjvhsrnux"

[storage.vector]
enabled = false

[auth]
site_url = "https://app.eventart.ca"
additional_redirect_urls = [
  "https://app.eventart.ca/auth/callback",
  "https://app.eventart.ca/reset-password",
  "https://app.eventart.ca/**",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/reset-password",
  "http://localhost:3001/auth/callback",
  "http://localhost:3001/reset-password"
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
